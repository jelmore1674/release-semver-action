name: Changelog

on:
  push:
    branches:
      - main
    paths:
      - "build-changelog/*"
      - "**/changelog.yml"
      - "CHANGELOG.md"

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Load secret
        id: load-op
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GH_APP_KEY: "op://Actions/GH_APP_KEY/private key"
          APP_ID: op://Actions/shared/APP_ID

      - name: Get Token
        id: get_workflow_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ steps.load-op.outputs.APP_ID}}
          private-key: ${{ steps.load-op.outputs.GH_APP_KEY }}

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2
          token: ${{ steps.get_workflow_token.outputs.token }}

      - name: Generate Changelog
        uses: jelmore1674/build-changelog@v2
        with:
          show_author_full_name: true
          commit_message: "Update Changelog [skip ci]"
          token: ${{ steps.get_workflow_token.outputs.token }}
          changelog_style: common-changelog
          auto_versioning: true
